version: "3.9"

services:
  # ========== 数据库 ==========
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_factory
      POSTGRES_USER: woami
      POSTGRES_PASSWORD: kali
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woami -d ai_factory"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_factory_net

  # ========== AI Factory API 服务 ==========
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_factory_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:8081}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-Qwen3.6-35B-A3B-UD-Q5_K_M}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ai_factory
      - POSTGRES_USER=woami
      - POSTGRES_PASSWORD=kali
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_factory_net

  # ========== 模型容器 (按需启动，使用 profiles="manual") ==========
  llamacpp-coder:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llamacpp-coder
    profiles: ["manual"]
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /home/data/llama-models:/models:ro
      - /home/data/docker/llama-models.ini:/presets/config.ini:ro
    environment:
      - GGML_HIPBLAS=on
      - LLAMA_SET_ROWS=1
      - ROCBLAS_USE_HIPBLASLT=1
      - HSA_ENABLE_SDMA=0
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    command: >-
      -m /models/Qwen3-Coder-30B-A3B-Instruct-Q5_K_M.gguf
      --preset /presets/config.ini
      --host 0.0.0.0
      --port 8080
      --flash-attn
      -ngl -1
      --threads 16
      --threads-batch 32
      --no-mmap
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    networks:
      - ai_factory_net

  llamacpp-writing:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llamacpp-writing
    profiles: ["manual"]
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /home/data/llama-models:/models:ro
      - /home/data/docker/llama-models.ini:/presets/config.ini:ro
    environment:
      - GGML_HIPBLAS=on
      - LLAMA_SET_ROWS=1
      - ROCBLAS_USE_HIPBLASLT=1
      - HSA_ENABLE_SDMA=0
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    command: >-
      -m /models/Qwen3.6-27B-Q5_K_M.gguf
      --preset /presets/config.ini
      --host 0.0.0.0
      --port 8080
      --flash-attn
      -ngl -1
      --threads 16
      --threads-batch 32
      --no-mmap
    devices:version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai_factory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: openclaw
